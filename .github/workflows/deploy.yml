name: Deploy to Fabric Workspace

# ─── How this workflow is triggered ──────────────────────────────────────────
# Instead of triggering on a push to a branch (like a normal workflow), this
# workflow is declared as "reusable" using workflow_call. That means it can
# only be triggered by another workflow calling it — it will never run on its
# own. Content repositories (the ones that hold your actual reports and models)
# each have their own thin workflow that calls this one.
#
# This pattern means all deployment logic lives in one place. If you need to
# change how deployments work — e.g. add a new step or update the Python
# version — you update this file once and every content repo benefits
# automatically the next time they run.
on:
  workflow_call:

    # ── Inputs ──────────────────────────────────────────────────────────────
    # Inputs are values the calling workflow passes in to configure this
    # deployment. Think of them like function arguments — the caller provides
    # the specifics, and this workflow does the work.
    inputs:

      content_repo:
        description: "The content repository to deploy from, in org/repo-name format (e.g. my-org/sales-reports)"
        required: true
        type: string

      environment_name:
        description: "The target environment name — must match the branch name and the Fabric workspace (dev, test, or prod)"
        required: true
        type: string

      workspace_id:
        description: "The GUID of the Fabric workspace to deploy into for this environment"
        required: true
        type: string

      # These two inputs have defaults so content repos don't need to specify
      # them unless their folder structure differs from the convention.
      reports_path:
        description: "Path to the reports folder within the content repo, relative to the repo root"
        required: false
        type: string
        default: "artifacts/reports"

      semantic_models_path:
        description: "Path to the semantic models folder within the content repo, relative to the repo root"
        required: false
        type: string
        default: "artifacts/semantic-models"

    # ── Secrets ─────────────────────────────────────────────────────────────
    # Secrets are like inputs but for sensitive values — they are masked in
    # logs and never exposed in plain text.
    #
    # AZURE_CLIENT_ID / SECRET / TENANT_ID are the service principal credentials
    # used to authenticate to Fabric. These are stored once at the org or
    # central-repo level and passed in by each calling workflow.
    #
    # GH_PAT is a GitHub Personal Access Token with read access to the content
    # repositories. The central repo's default GITHUB_TOKEN only grants access
    # to the central repo itself, so a PAT is required to check out a different
    # repo's code. See the README for how to create and store this token.
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      AZURE_TENANT_ID:
        required: true
      GH_PAT:
        required: true


# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  deploy:
    name: Deploy ${{ inputs.content_repo }} to ${{ inputs.environment_name }}
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Check out the content repo ────────────────────────────────
      # This downloads the reports, semantic models, and parameter file from
      # the calling repository onto the runner. We check out the branch that
      # matches the target environment (dev / test / prod) so we always deploy
      # the right version of the content for that environment.
      #
      # path: content puts the files in a subfolder called "content" so they
      # don't collide with the deployment repo files we check out next.
      #
      # token uses the GH_PAT secret rather than the default GITHUB_TOKEN
      # because GITHUB_TOKEN is scoped to the repo where the workflow lives
      # (this central repo), and cannot read other repositories.
      - name: Check out content repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.content_repo }}
          ref: ${{ inputs.environment_name }}
          path: content
          token: ${{ secrets.GH_PAT }}

      # ── Step 2: Check out the deployment repo (this repo) ─────────────────
      # This downloads the Python scripts and requirements.txt from this
      # central repo. Because we are inside this repo's own workflow, no token
      # is needed — the default GITHUB_TOKEN covers it.
      #
      # path: deployment puts the files in a subfolder called "deployment" to
      # keep them clearly separate from the content repo files above.
      - name: Check out deployment repo
        uses: actions/checkout@v4
        with:
          path: deployment

      # ── Step 3: Install Python ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          # Because both repos are checked out into subfolders (deployment/ and
          # content/), requirements.txt is not in the workspace root where pip
          # caching looks by default. Pointing it at the exact path fixes that.
          cache-dependency-path: deployment/requirements.txt

      # ── Step 4: Install Python dependencies ───────────────────────────────
      # requirements.txt lives in the deployment repo, so we reference it via
      # the "deployment" subfolder path.
      - name: Install dependencies
        run: pip install -r deployment/requirements.txt

      # ── Step 5: Run the deployment script ─────────────────────────────────
      # The deploy script needs to know where the artifact folders are. Because
      # both repos were checked out into subfolders, we build the full absolute
      # paths here and pass them as environment variables.
      #
      # github.workspace is the absolute path to the runner's working directory,
      # e.g. /home/runner/work/fabric-deployment-pipeline/fabric-deployment-pipeline
      # Appending /content/artifacts/reports gives the full path to the reports.
      - name: Deploy reports and semantic models
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          FABRIC_WORKSPACE_ID: ${{ inputs.workspace_id }}
          ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          REPORTS_PATH: ${{ github.workspace }}/content/${{ inputs.reports_path }}
          SEMANTIC_MODELS_PATH: ${{ github.workspace }}/content/${{ inputs.semantic_models_path }}
        run: python deployment/scripts/deploy.py
